unbind r
bind r source-file ~/.tmux.conf


# Set new panes to open in current directory
bind R command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind h split-window -hb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
bind j split-window -c "#{pane_current_path}"
bind k split-window -b -c "#{pane_current_path}"
bind a splitw -h -l 80
bind f display-popup -E "~/dotfiles/tmux/tmux-sessionizer.sh"
bind E run-shell "~/dotfiles/tmux/tmux-sessionizer.sh ~/EPEXcpp"
bind D run-shell "~/dotfiles/tmux/tmux-sessionizer.sh ~/dotfiles"
bind S run-shell "~/dotfiles/tmux/tmux-sessionizer.sh ~/simulation"
bind M run-shell "~/dotfiles/tmux/tmux-sessionizer.sh ~/models"
bind P switch-client -p
bind N switch-client -n
bind K kill-session

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

bind -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'
bind -n C-Space next-window

set-option -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
set-option -g history-limit 50000

set -g prefix C-s
set -g mouse on

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

set -sg escape-time 10
# Ensures neovim updates buffers on external changes
set -g focus-events on

